kind = "web"
previewPath = "/"
title = "Glens Residential Home"
version = "1.0.0"
id = "artifacts/glens-residential"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25900

[services.development]
run = "pnpm --filter @workspace/glens-residential run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glens-residential", "run", "build" ]
publicDir = "artifacts/glens-residential/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25900"
BASE_PATH = "/"
